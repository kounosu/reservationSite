name: reservation-site

services:
  app:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
    working_dir: /var/www/html
    environment:
      APP_ENV: local
      COMPOSER_ALLOW_SUPERUSER: "1"
    volumes:
      - ./src:/var/www/html
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ./src:/var/www/html:ro
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: mysql:8.4
    command:
      - --default-time-zone=+09:00
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: reservation_site
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Tokyo
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  vite:
    image: node:24-bookworm-slim
    working_dir: /var/www/html
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - ./src:/var/www/html
      - node-modules:/var/www/html/node_modules

  composer:
    image: composer:2
    working_dir: /app
    environment:
      COMPOSER_CACHE_DIR: /tmp/composer-cache
    volumes:
      - ./src:/app
      - composer-cache:/tmp/composer-cache

volumes:
  mysql-data:
    name: reservation-site-mysql84v2-data
  node-modules:
  composer-cache:
